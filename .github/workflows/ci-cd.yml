name: CI/CD

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: pnpm/action-setup@v5
        with:
          version: 10
      # setup-node with cache: 'pnpm' transparently caches the pnpm store
      # (keyed on pnpm-lock.yaml). A separate actions/cache step is redundant
      # and — because pnpm 10 stores at ~/.local/share/pnpm/store, not
      # ~/.pnpm-store — the old manual step silently failed to save the cache
      # on every run.
      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: 'pnpm'
      - run: pnpm install --frozen-lockfile
      - run: pnpm lint

  typecheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: pnpm/action-setup@v5
        with:
          version: 10
      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: 'pnpm'
      - run: pnpm install --frozen-lockfile
      - run: pnpm typecheck

  unit-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: pnpm/action-setup@v5
        with:
          version: 10
      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: 'pnpm'
      - run: pnpm install --frozen-lockfile
      - run: pnpm test:coverage
      - uses: actions/upload-artifact@v7
        with:
          name: coverage
          path: coverage/

  e2e-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: pnpm/action-setup@v5
        with:
          version: 10
      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: 'pnpm'
      - run: pnpm install --frozen-lockfile

      # Cache Playwright browser binaries — key on lockfile so it only misses
      # when Playwright itself is upgraded, not on every code change.
      - name: Cache Playwright browsers
        id: playwright-cache
        uses: actions/cache@v5
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ runner.os }}-${{ hashFiles('pnpm-lock.yaml') }}
      - name: Install Playwright with system deps (cache miss)
        if: steps.playwright-cache.outputs.cache-hit != 'true'
        run: pnpm exec playwright install --with-deps chromium
      - name: Install Playwright system deps only (cache hit)
        if: steps.playwright-cache.outputs.cache-hit == 'true'
        run: pnpm exec playwright install-deps chromium

      - name: Build
        run: pnpm build

      # Enforce the bundle-size budget so regressions surface in CI.
      - name: Bundle-size budget
        run: pnpm check:bundle

      # Audit event listeners / observers for missing cleanup.
      - name: Listener audit
        run: pnpm audit:listeners

      # Upload dist so the deploy and lighthouse jobs can reuse it.
      - name: Upload dist artifact
        uses: actions/upload-artifact@v7
        with:
          name: dist-${{ github.sha }}
          path: dist/
          retention-days: 1

      - run: pnpm test:e2e --workers=4
      - uses: actions/upload-artifact@v7
        if: failure()
        with:
          name: playwright-report
          path: playwright-report/

  lighthouse:
    needs: e2e-test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: pnpm/action-setup@v5
        with:
          version: 10
      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: 'pnpm'
      - run: pnpm install --frozen-lockfile

      # Reuse the already-built dist from e2e-test — no rebuild.
      - name: Download dist artifact
        uses: actions/download-artifact@v5
        with:
          name: dist-${{ github.sha }}
          path: dist/

      # Use Google's official Lighthouse CI (LHCI) via the treosh wrapper.
      # LHCI starts its own static server (configured in lighthouserc.json),
      # runs Lighthouse 3× on the root URL, asserts against the thresholds
      # in lighthouserc.json, and uploads the HTML report as a temporary
      # public link that gets commented on the PR.
      #
      # Note: we audit lab metrics (Performance, Accessibility, LCP, CLS,
      # TBT). INP is a field-only metric — measured client-side by the
      # web-vitals library, not here.
      - name: Lighthouse CI
        uses: treosh/lighthouse-ci-action@v12
        with:
          configPath: ./lighthouserc.json
          uploadArtifacts: true
          temporaryPublicStorage: true

  deploy:
    needs: [lint, typecheck, unit-test, e2e-test, lighthouse]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    runs-on: ubuntu-latest
    permissions:
      contents: read   # required for checkout
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      # Download the dist artifact built (and tested) by e2e-test — no rebuild needed.
      - name: Download dist artifact
        uses: actions/download-artifact@v5
        with:
          name: dist-${{ github.sha }}
          path: dist/

      - uses: actions/configure-pages@v6
      - uses: actions/upload-pages-artifact@v5.0.0
        with:
          path: dist
      - id: deployment
        uses: actions/deploy-pages@v5.0.0
